name: Weekly Newsletter

on:
  schedule:
    # 8:45 AM ET on Tuesdays. GitHub Actions cron always runs in UTC and has no
    # DST awareness, so two schedules cover the two ET offsets across the year
    # -- accurate except for the handful of days right at the DST switchover
    # itself (second Sunday of March / first Sunday of November).
    - cron: "45 12 * 3-10 2" # EDT (UTC-4): Mar-Oct, 8:45 AM ET = 12:45 UTC
    - cron: "45 13 * 11,12,1,2 2" # EST (UTC-5): Nov-Feb, 8:45 AM ET = 13:45 UTC
  workflow_dispatch:
    inputs:
      week:
        description: "Week to recap (leave blank for most recently completed week)"
        required: false
      send:
        description: "Actually send email/SMS (default: false -- just generates and commits latest/ for preview)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send newsletter
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          NEWSLETTER_EMAILS: ${{ secrets.NEWSLETTER_EMAILS }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          NEWSLETTER_PHONES: ${{ secrets.NEWSLETTER_PHONES }}
        run: |
          WEEK_ARG=""
          if [ -n "${{ github.event.inputs.week }}" ]; then
            WEEK_ARG="--week ${{ github.event.inputs.week }}"
          fi
          SEND_ARGS=""
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.send }}" == "true" ]; then
            SEND_ARGS="--send-email --send-sms"
          fi
          python newsletter.py $WEEK_ARG $SEND_ARGS

      - name: Upload newsletter artifacts
        uses: actions/upload-artifact@v4
        with:
          name: newsletter
          path: output/

      - name: Commit latest newsletter to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest/
          git diff --staged --quiet || git commit -m "Update latest newsletter [skip ci]"
          git push
